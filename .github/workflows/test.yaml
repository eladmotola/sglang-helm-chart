name: Test Helm Chart

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint chart
        run: helm lint .

      - name: Template chart (single-node)
        run: |
          helm template sglang . \
            --set replicaCount=1 \
            --set hfSecret.token=test-token \
            --debug

      - name: Template chart (multi-node)
        run: |
          helm template sglang . \
            --set replicaCount=2 \
            --set model.tensorParallelSize=8 \
            --set hfSecret.token=test-token \
            --debug

      - name: Template chart (with ExternalSecret)
        run: |
          helm template sglang . \
            --set hfSecret.externalSecret.secretStoreRef.name=test-store \
            --set hfSecret.externalSecret.remoteRef.key=test-key \
            --debug
